syntax = "proto3";

package futureq;

option go_package = "github.com/futureq-io/futureq/proto";

message QueueMessage {
    string message_id = 1;
    bytes payload = 2;
}

message AckRequest {
    string message_id = 1;
    bool success = 2;
}

service FutureQConsumer {
    rpc Subscribe(stream AckRequest) returns (stream QueueMessage);
}