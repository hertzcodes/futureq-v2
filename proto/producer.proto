syntax = "proto3";

package futureq;

option go_package = "github.com/futureq-io/futureq/proto";

message StreamPublishRequest {
    string message_id = 1;
    string topic = 2;
    bytes payload = 3;
    int64 execute_at_unix_ms = 4;
}

message StreamPublishAck {
    string message_id = 1;
    bool success = 2;
    string error_message = 3;
}

service FutureQProducer {
    rpc PublishStream(stream StreamPublishRequest) returns (stream StreamPublishAck);
}